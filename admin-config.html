<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NashOS — Admin Configuration Center</title>
<style>
  :root {
    --navy: #1a2332;
    --navy-light: #243044;
    --navy-mid: #2a3a52;
    --accent: #3b82f6;
    --accent-light: #60a5fa;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.1);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,0.1);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.1);
    --orange: #f97316;
    --purple: #a855f7;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-bright: #f8fafc;
    --border: #334155;
    --card: #1e293b;
    --card-hover: #263548;
    --sidebar-w: 240px;
    --config-sidebar-w: 200px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--navy); color: var(--text); display: flex; min-height: 100vh; }
  .sidebar { width: var(--sidebar-w); background: var(--navy-light); border-right: 1px solid var(--border); padding: 20px 0; flex-shrink: 0; display: flex; flex-direction: column; }
  .logo { padding: 0 20px 24px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: white; }
  .logo-text { font-size: 18px; font-weight: 700; color: var(--text-bright); }
  .logo-text span { color: var(--accent-light); }
  .nav-section { padding: 12px 12px 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-dim); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; color: var(--text-dim); text-decoration: none; font-size: 14px; cursor: pointer; transition: all 0.15s; border-left: 3px solid transparent; }
  .nav-item:hover { background: var(--navy-mid); color: var(--text); }
  .nav-item.active { background: rgba(59,130,246,0.1); color: var(--accent-light); border-left-color: var(--accent); font-weight: 500; }
  .nav-item .icon { width: 18px; text-align: center; font-size: 15px; }
  .sidebar-footer { margin-top: auto; padding: 16px 20px; border-top: 1px solid var(--border); }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 32px; height: 32px; background: var(--orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: white; }
  .user-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .user-role { font-size: 11px; color: var(--text-dim); }
  .config-sidebar { width: var(--config-sidebar-w); background: var(--card); border-right: 1px solid var(--border); flex-shrink: 0; overflow-y: auto; }
  .config-sidebar-header { padding: 16px 16px 12px; border-bottom: 1px solid var(--border); }
  .config-sidebar-title { font-size: 13px; font-weight: 600; color: var(--text-bright); margin-bottom: 10px; }
  .config-search { width: 100%; padding: 7px 10px; background: var(--navy-mid); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; outline: none; }
  .config-search::placeholder { color: var(--text-dim); }
  .config-search:focus { border-color: var(--accent); }
  .config-nav-item { display: flex; align-items: center; gap: 8px; padding: 9px 16px; font-size: 13px; color: var(--text-dim); cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; }
  .config-nav-item:hover { background: var(--navy-mid); color: var(--text); }
  .config-nav-item.active { color: var(--accent-light); border-left-color: var(--accent); background: rgba(59,130,246,0.08); font-weight: 500; }
  .config-nav-item .cnt { margin-left: auto; font-size: 11px; color: var(--text-dim); background: var(--navy-mid); padding: 1px 7px; border-radius: 8px; }
  .config-nav-icon { font-size: 13px; width: 16px; text-align: center; }
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .topbar { padding: 16px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--navy-light); flex-shrink: 0; }
  .topbar h1 { font-size: 18px; font-weight: 600; color: var(--text-bright); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .btn { padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent-light); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-outline:hover { background: var(--navy-mid); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-green { background: var(--green); color: white; }
  .btn-danger { background: transparent; border: 1px solid rgba(239,68,68,0.4); color: var(--red); }
  .btn-danger:hover { background: var(--red-bg); }
  .content { padding: 24px 28px; flex: 1; overflow-y: auto; }
  .filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-pill { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); color: var(--text-dim); background: transparent; transition: all 0.15s; }
  .filter-pill:hover { border-color: var(--accent); color: var(--text); }
  .filter-pill.active { background: rgba(59,130,246,0.15); border-color: var(--accent); color: var(--accent-light); }
  .search-input { padding: 7px 12px; background: var(--navy-mid); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; width: 220px; outline: none; }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); background: var(--navy-light); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid rgba(51,65,85,0.5); }
  tr.clickable:hover td { background: var(--card-hover); cursor: pointer; }
  tr:last-child td { border-bottom: none; }
  .mono { font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px; color: var(--accent-light); }
  .dim { color: var(--text-dim); }
  .bright { color: var(--text-bright); font-weight: 500; }
  .badge { display: inline-flex; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge-interior { background: rgba(59,130,246,0.15); color: var(--accent-light); }
  .badge-exterior { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-cabinets { background: rgba(168,85,247,0.15); color: var(--purple); }
  .badge-deck { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge-fence { background: rgba(249,115,22,0.15); color: var(--orange); }
  .badge-drywall { background: rgba(148,163,184,0.15); color: var(--text-dim); }
  .badge-active { background: var(--green-bg); color: var(--green); }
  .badge-inactive { background: var(--red-bg); color: var(--red); }
  .link-count { color: var(--accent-light); font-size: 12px; }
  .detail-overlay { position: fixed; top: 0; right: 0; bottom: 0; width: 520px; max-width: 100vw; background: var(--card); border-left: 1px solid var(--border); box-shadow: -8px 0 30px rgba(0,0,0,0.4); z-index: 100; display: none; flex-direction: column; transition: transform 0.2s; }
  .detail-overlay.open { display: flex; }
  .detail-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .detail-title { font-size: 16px; font-weight: 600; color: var(--text-bright); }
  .detail-close { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .detail-close:hover { background: var(--navy-mid); color: var(--text); }
  .detail-body { padding: 20px 24px; flex: 1; overflow-y: auto; }
  .detail-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; flex-shrink: 0; }
  .form-group { margin-bottom: 18px; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
  .form-input { width: 100%; padding: 9px 12px; background: var(--navy-mid); border: 1px solid var(--border); border-radius: 6px; color: var(--text-bright); font-size: 13px; outline: none; }
  .form-input:focus { border-color: var(--accent); }
  .form-select { width: 100%; padding: 9px 12px; background: var(--navy-mid); border: 1px solid var(--border); border-radius: 6px; color: var(--text-bright); font-size: 13px; outline: none; appearance: auto; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-toggle { display: flex; align-items: center; gap: 10px; }
  .toggle { width: 36px; height: 20px; background: var(--border); border-radius: 10px; position: relative; cursor: pointer; transition: background 0.2s; }
  .toggle.on { background: var(--accent); }
  .toggle::after { content: ''; width: 16px; height: 16px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: left 0.2s; }
  .toggle.on::after { left: 18px; }
  .toggle-label { font-size: 13px; color: var(--text); }
  .form-divider { height: 1px; background: var(--border); margin: 20px 0; }
  .recipe-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--navy-mid); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; }
  .recipe-icon { font-size: 12px; }
  .recipe-name { font-size: 13px; color: var(--text-bright); flex: 1; }
  .recipe-detail { font-size: 11px; color: var(--text-dim); }
  .recipe-cost { font-size: 12px; font-weight: 600; color: var(--accent-light); font-family: 'SF Mono', monospace; }
  .recipe-remove { width: 20px; height: 20px; border-radius: 4px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-size: 12px; }
  .recipe-remove:hover { background: var(--red-bg); color: var(--red); }
  .cost-rollup { background: var(--navy-mid); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-top: 16px; }
  .cost-row { display: flex; justify-content: space-between; padding: 4px 0; }
  .cost-label { font-size: 12px; color: var(--text-dim); }
  .cost-value { font-size: 12px; font-weight: 600; color: var(--text-bright); font-family: 'SF Mono', monospace; }
  .cost-divider { height: 1px; background: var(--border); margin: 8px 0; }
  .cost-total .cost-label { color: var(--text-bright); font-weight: 600; }
  .cost-total .cost-value { color: var(--green); font-size: 14px; }
  .cost-gp { font-size: 11px; color: var(--text-dim); text-align: right; margin-top: 4px; }
  .impact-banner { background: var(--yellow-bg); border: 1px solid rgba(234,179,8,0.3); border-radius: 8px; padding: 10px 14px; margin-top: 12px; display: flex; align-items: flex-start; gap: 8px; }
  .impact-text { font-size: 12px; color: var(--yellow); line-height: 1.5; }
  .history-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid rgba(51,65,85,0.4); }
  .history-item:last-child { border-bottom: none; }
  .history-date { font-size: 11px; color: var(--text-dim); white-space: nowrap; min-width: 80px; }
  .history-text { font-size: 12px; color: var(--text); }
  .detail-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .detail-tab { padding: 10px 20px; font-size: 13px; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; }
  .detail-tab:hover { color: var(--text); }
  .detail-tab.active { color: var(--accent-light); border-bottom-color: var(--accent); font-weight: 500; }
  .add-dropdown { position: absolute; background: var(--card); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 200; width: 300px; max-height: 250px; overflow-y: auto; }
  .add-dropdown-item { padding: 8px 14px; font-size: 13px; color: var(--text); cursor: pointer; display: flex; justify-content: space-between; }
  .add-dropdown-item:hover { background: var(--navy-mid); }
  .add-dropdown-item .mc-type { font-size: 11px; color: var(--text-dim); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  @media (max-width: 1200px) { .sidebar { display: none; } }
  @media (max-width: 900px) {
    .config-sidebar { display: none; }
    .detail-overlay { width: 100% !important; left: 0 !important; right: 0 !important; border-left: none; }
    .topbar { padding: 12px 16px; flex-direction: column; gap: 8px; align-items: flex-start; }
    .topbar h1 { font-size: 16px; }
    .content { padding: 16px; }
    .filter-bar { gap: 6px; }
    .search-input { width: 100%; }
    table { min-width: 600px; }
    .card { overflow-x: auto; }
  }
  @media (max-width: 680px) {
    .detail-overlay { width: 100% !important; left: 0 !important; right: 0 !important; border-left: none; box-shadow: none; }
    .detail-header { padding: 12px 16px; }
    .detail-body { padding: 16px; }
    .detail-footer { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
    .detail-footer .btn { flex: 1; justify-content: center; }
    .detail-title { font-size: 14px; }
    .form-row { grid-template-columns: 1fr; }
    .form-group { margin-bottom: 14px; }
    .recipe-item { flex-wrap: wrap; gap: 6px; padding: 8px 10px; }
    .recipe-name { flex-basis: 100%; }
    .cost-rollup { padding: 10px 12px; }
    .topbar { padding: 10px 12px; }
    .content { padding: 12px; }
    .filter-pill { padding: 5px 10px; font-size: 11px; }
  }
</style>
</head>

    history:[{date:'Jan 10',text:'Created bundle — Bill'}] },
  { id:12, name:'Wallpaper Strip — Per SF', customerName:'Wallpaper Removal', category:'Interior', package:'Standard', unit:'SF', status:'Inactive', costPerUnit:0.95, sellPerUnit:1.90, gpPct:50, components:[25,26], estimates:0,
    history:[{date:'Feb 12',text:'Deactivated — Bill'}] },
];

const materialItems = [
  { name:'Interior Wall Paint — Eggshell', supplier:'Hoover Paint', unitSize:'1 gal', unitCost:'$41.32', updated:'Feb 15, 2025' },
  { name:'Interior Ceiling Paint — Flat', supplier:'Hoover Paint', unitSize:'1 gal', unitCost:'$38.50', updated:'Feb 15, 2025' },
  { name:'Trim Enamel — Semi-Gloss', supplier:'Hoover Paint', unitSize:'1 gal', unitCost:'$45.00', updated:'Jan 20, 2025' },
  { name:'Exterior Acrylic — Satin', supplier:'Hoover Paint', unitSize:'1 gal', unitCost:'$52.60', updated:'Feb 1, 2025' },
  { name:'Primer — Stain Block', supplier:'Hoover Paint', unitSize:'1 gal', unitCost:'$38.75', updated:'Jan 15, 2025' },
  { name:'Cabinet Enamel — Semi-Gloss', supplier:'Hoover Paint', unitSize:'1 gal', unitCost:'$62.00', updated:'Feb 8, 2025' },
  { name:'Cabinet Primer', supplier:'Hoover Paint', unitSize:'1 gal', unitCost:'$48.50', updated:'Jan 15, 2025' },
  { name:'Deck Stain — Semi-Transparent', supplier:'Hoover Paint', unitSize:'1 gal', unitCost:'$45.00', updated:'Jan 28, 2025' },
  { name:'Fence Stain — Semi-Transparent', supplier:'Hoover Paint', unitSize:'1 gal', unitCost:'$42.00', updated:'Feb 5, 2025' },
  { name:'Caulk — Interior', supplier:'Home Depot', unitSize:'10.1 oz tube', unitCost:'$4.89', updated:'Dec 1, 2024' },
  { name:'Drywall Compound', supplier:'Home Depot', unitSize:'1 gal', unitCost:'$12.00', updated:'Nov 15, 2024' },
  { name:'Wallpaper Adhesive Remover', supplier:'Home Depot', unitSize:'1 gal', unitCost:'$18.50', updated:'Oct 1, 2024' },
];

const laborRates = [
  { name:'Standard Painter', rate:'$30.00', sfhr:'350 SF/hr (walls)', effective:'Jan 1, 2025' },
  { name:'Lead Painter', rate:'$35.00', sfhr:'300 SF/hr (walls)', effective:'Jan 1, 2025' },
  { name:'Apprentice', rate:'$22.00', sfhr:'250 SF/hr (walls)', effective:'Jan 1, 2025' },
];

const heightTiers = [
  { name:'Standard', range:'0–9 ft', multiplier:'1.00x' },
  { name:'Elevated', range:'10–15 ft', multiplier:'1.35x' },
  { name:'High', range:'16+ ft', multiplier:'1.75x' },
];

const pricingPackages = [
  { name:'Value', multiplier:'0.85x', desc:'Basic prep, builder-grade paint' },
  { name:'Standard', multiplier:'1.00x', desc:'Full prep, premium paint, 2 coats' },
  { name:'Premium Plus', multiplier:'1.25x', desc:'Extended prep, top-tier paint, extra detail' },
  { name:'Cabinet Standard', multiplier:'1.00x', desc:'Spray application, quality enamel' },
  { name:'Cabinet Premium', multiplier:'1.30x', desc:'Hand-sanded, catalyzed finish' },
  { name:'Deck Standard', multiplier:'1.00x', desc:'Power wash, 1 coat stain' },
  { name:'Deck Premium', multiplier:'1.20x', desc:'Brightener + 2 coat stain' },
  { name:'Fence Standard', multiplier:'1.00x', desc:'Spray application, 1 coat' },
  { name:'Fence Premium', multiplier:'1.15x', desc:'Spray + backbrush, 2 coats' },
];

const configCategories = [
  { key:'bundles', icon:'🧩', label:'Service Bundles', cnt:142 },
  { key:'micro', icon:'⚛️', label:'Micro-Components', cnt:87 },
  { key:'materials', icon:'🪣', label:'Material Items', cnt:64 },
  { key:'labor', icon:'💰', label:'Labor Rates', cnt:3 },
  { key:'height', icon:'📏', label:'Height Tiers', cnt:3 },
  { key:'packages', icon:'📦', label:'Pricing Packages', cnt:9 },
];

let activeCategory = 'bundles';
let activeFilter = 'All';
let searchTerm = '';
let activeDetailTab = 'definition';
let editingBundle = null;
let editingComponents = [];

// ─── CONFIG NAV ───
function renderConfigNav() {
  const nav = document.getElementById('configNav');
  nav.innerHTML = configCategories.map(c =>
    `<div class="config-nav-item ${c.key===activeCategory?'active':''}" onclick="switchCategory('${c.key}')">
      <span class="config-nav-icon">${c.icon}</span> ${c.label} <span class="cnt">${c.cnt}</span>
    </div>`
  ).join('');
}

function switchCategory(key) {
  activeCategory = key;
  renderConfigNav();
  document.getElementById('topbarTitle').textContent = configCategories.find(c=>c.key===key).label;
  const tr = document.getElementById('topbarRight');
  tr.innerHTML = key === 'bundles'
    ? `<button class="btn btn-outline" onclick="exportJSON()">📤 Export JSON</button><button class="btn btn-primary" onclick="openNewBundle()">+ New Bundle</button>`
    : '';
  closeDetail();
  renderMainContent();
}

// ─── MAIN CONTENT ───
function renderMainContent() {
  const el = document.getElementById('mainContent');
  if (activeCategory === 'bundles') { renderBundles(el); return; }
  const tables = {
    micro: { cols:['Name','Type','Rate','Unit','Cost/Unit','Used In'], rows: microComponents.map(m => {
      const usedIn = bundles.filter(b=>b.components.includes(m.id)).length;
      return [m.name, `<span class="badge ${m.type==='LABOR'?'badge-interior':'badge-cabinets'}">${m.type}</span>`, m.rate, m.unit, `$${m.costPerUnit.toFixed(3)}`, `${usedIn} bundles`];
    })},
    materials: { cols:['Name','Supplier','Unit Size','Unit Cost','Last Updated'], rows: materialItems.map(m=>[m.name,m.supplier,m.unitSize,m.unitCost,m.updated]) },
    labor: { cols:['Name','Rate ($/hr)','SF/hr Equivalent','Effective Date'], rows: laborRates.map(l=>[l.name,l.rate,l.sfhr,l.effective]) },
    height: { cols:['Tier Name','Height Range','Production Multiplier'], rows: heightTiers.map(h=>[h.name,h.range,h.multiplier]) },
    packages: { cols:['Package Name','Multiplier','Description'], rows: pricingPackages.map(p=>[p.name,p.multiplier,p.desc]) },
  };
  const t = tables[activeCategory];
  el.innerHTML = `<div class="card"><table><thead><tr>${t.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${t.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}

function renderBundles(el) {
  const pills = ['All','Interior','Exterior','Cabinets','Deck','Fence','Drywall'];
  const filtered = bundles.filter(b => {
    if (activeFilter !== 'All' && b.category !== activeFilter) return false;
    if (searchTerm && !b.name.toLowerCase().includes(searchTerm.toLowerCase())) return false;
    return true;
  });
  const badgeClass = c => 'badge-' + c.toLowerCase();
  el.innerHTML = `
    <div class="filter-bar">
      <input class="search-input" placeholder="🔍 Search bundles..." value="${searchTerm}" oninput="searchTerm=this.value;renderMainContent()"/>
      ${pills.map(p=>`<div class="filter-pill ${p===activeFilter?'active':''}" onclick="activeFilter='${p}';renderMainContent()">${p}</div>`).join('')}
    </div>
    <div class="card"><table><thead><tr>
      <th>Bundle Name</th><th>Customer Name</th><th>Category</th><th>Package</th><th>Unit</th><th>Components</th><th>Cost/Unit</th><th>Sell/Unit</th><th>Status</th>
    </tr></thead><tbody>
      ${filtered.map(b => {
        const inactive = b.status==='Inactive';
        const st = inactive ? 'style="text-decoration:line-through;color:var(--text-dim)"' : '';
        return `<tr class="clickable" onclick="openBundle(${b.id})" ${editingBundle&&editingBundle.id===b.id?'style="background:rgba(59,130,246,0.05)"':''}>
          <td class="bright" ${st}>${b.name}</td><td class="dim" ${inactive?st:''}>${b.customerName}</td>
          <td><span class="badge ${badgeClass(b.category)}">${b.category}</span></td>
          <td>${b.package}</td><td class="mono">${b.unit}</td>
          <td><span class="link-count">${b.components.length} MCs</span></td>
          <td class="mono">$${b.costPerUnit.toFixed(2)}</td><td class="mono">$${b.sellPerUnit.toFixed(2)}</td>
          <td><span class="badge badge-${b.status.toLowerCase()}">${b.status}</span></td>
        </tr>`;
      }).join('')}
    </tbody></table></div>`;
}

// ─── DETAIL PANEL ───
function openBundle(id) {
  editingBundle = JSON.parse(JSON.stringify(bundles.find(b=>b.id===id)));
  editingComponents = [...editingBundle.components];
  activeDetailTab = 'definition';
  renderDetail();
  document.getElementById('detailPanel').classList.add('open');
  renderMainContent();
}

function openNewBundle() {
  editingBundle = { id:0, name:'', customerName:'', category:'Interior', package:'Standard', unit:'SF', status:'Active', costPerUnit:0, sellPerUnit:0, gpPct:50, components:[], estimates:0, history:[] };
  editingComponents = [];
  activeDetailTab = 'definition';
  document.getElementById('detailTitle').textContent = 'New Service Bundle';
  renderDetail();
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  editingBundle = null;
  renderMainContent();
}

function renderDetail() {
  if (!editingBundle) return;
  document.getElementById('detailTitle').textContent = editingBundle.id ? 'Edit Service Bundle' : 'New Service Bundle';
  // tabs
  document.querySelectorAll('.detail-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === activeDetailTab);
    t.onclick = () => { activeDetailTab = t.dataset.tab; renderDetail(); };
  });
  const body = document.getElementById('detailBody');
  if (activeDetailTab === 'definition') renderDefinitionTab(body);
  else if (activeDetailTab === 'components') renderComponentsTab(body);
  else renderHistoryTab(body);
}

function renderDefinitionTab(el) {
  const b = editingBundle;
  const cats = ['Interior','Exterior','Cabinets','Deck','Fence','Carpentry','Doors','Drywall','Floor','Popcorn','T&M'];
  const pkgs = ['Value','Standard','Premium+','—'];
  const units = ['SF','LF','EA','HOUR'];
  const wcats = ['INTERIOR','EXTERIOR','CABINET','DECK_FENCE'];
  el.innerHTML = `
    <div class="form-group"><label class="form-label">Internal Name</label><input class="form-input" value="${b.name}" onchange="editingBundle.name=this.value"/></div>
    <div class="form-group"><label class="form-label">Customer-Facing Name</label><input class="form-input" value="${b.customerName}" onchange="editingBundle.customerName=this.value"/></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Category</label><select class="form-select" onchange="editingBundle.category=this.value">${cats.map(c=>`<option ${c===b.category?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Package</label><select class="form-select" onchange="editingBundle.package=this.value">${pkgs.map(p=>`<option ${p===b.package?'selected':''}>${p}</option>`).join('')}</select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Primary Unit</label><select class="form-select" onchange="editingBundle.unit=this.value">${units.map(u=>`<option ${u===b.unit?'selected':''}>${u}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Work Category</label><select class="form-select">${wcats.map(w=>`<option>${w}</option>`).join('')}</select></div>
    </div>
    <div class="form-row" style="margin-top:8px">
      <div class="form-toggle"><div class="toggle ${b.category==='Exterior'?'on':''}" onclick="this.classList.toggle('on')"></div><span class="toggle-label">Exterior</span></div>
      <div class="form-toggle"><div class="toggle" onclick="this.classList.toggle('on')"></div><span class="toggle-label">Excluded from Value</span></div>
    </div>`;
}

function renderComponentsTab(el) {
  const comps = editingComponents.map(id => microComponents.find(m=>m.id===id)).filter(Boolean);
  const laborTotal = comps.filter(c=>c.type==='LABOR').reduce((s,c)=>s+c.costPerUnit,0);
  const matTotal = comps.filter(c=>c.type==='MATERIAL').reduce((s,c)=>s+c.costPerUnit,0);
  const total = laborTotal + matTotal;
  const gp = editingBundle.gpPct || 50;
  const sell = total / (1 - gp/100);
  const unit = editingBundle.unit;

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;position:relative;">
      <label class="form-label" style="margin:0;">Components (Recipe)</label>
      <button class="btn btn-sm btn-outline" onclick="toggleAddDropdown(event)">+ Add</button>
      <div class="add-dropdown" id="addDropdown" style="display:none;right:0;top:32px;"></div>
    </div>
    ${comps.map((c,i) => `<div class="recipe-item">
      <span class="recipe-icon">${c.type==='LABOR'?'🔵':'🟣'}</span>
      <div class="recipe-name">${c.name}</div>
      <div class="recipe-detail">${c.type} · ${c.rate}</div>
      <div class="recipe-cost">$${c.costPerUnit.toFixed(3)}/${unit}</div>
      <button class="recipe-remove" onclick="removeComponent(${i})">✕</button>
    </div>`).join('')}
    <div class="cost-rollup">
      <div style="font-size:12px;font-weight:600;color:var(--text-bright);margin-bottom:10px;">CALCULATED COST PER ${unit}</div>
      <div class="cost-row"><span class="cost-label">Labor</span><span class="cost-value">$${laborTotal.toFixed(3)}</span></div>
      <div class="cost-row"><span class="cost-label">Material</span><span class="cost-value">$${matTotal.toFixed(3)}</span></div>
      <div class="cost-divider"></div>
      <div class="cost-row cost-total"><span class="cost-label">Total Cost</span><span class="cost-value">$${total.toFixed(3)}/${unit}</span></div>
      <div class="cost-divider"></div>
      <div class="cost-row"><span class="cost-label">At ${gp}% GP target → Sell price</span><span class="cost-value" style="color:var(--green)">$${sell.toFixed(3)}/${unit}</span></div>
      <div class="cost-gp">500 ${unit} room → $${(total*500).toFixed(2)} cost / $${(sell*500).toFixed(2)} sell</div>
    </div>
    ${editingBundle.estimates ? `<div class="impact-banner"><span>⚠️</span><span class="impact-text">This bundle is used in <strong>${editingBundle.estimates} active estimates</strong>. Changes will only affect NEW estimates.</span></div>` : ''}`;
}

function renderHistoryTab(el) {
  const h = editingBundle.history || [];
  el.innerHTML = h.length ? h.map(e => `<div class="history-item"><span class="history-date">${e.date}</span><span class="history-text">${e.text}</span></div>`).join('') : '<div class="dim" style="padding:20px 0">No history yet.</div>';
}

function removeComponent(idx) {
  editingComponents.splice(idx, 1);
  renderDetail();
}

function toggleAddDropdown(e) {
  e.stopPropagation();
  const dd = document.getElementById('addDropdown');
  if (dd.style.display === 'block') { dd.style.display = 'none'; return; }
  const available = microComponents.filter(m => !editingComponents.includes(m.id));
  dd.innerHTML = available.length ? available.map(m =>
    `<div class="add-dropdown-item" onclick="addComponent(${m.id})">${m.name} <span class="mc-type">${m.type} · $${m.costPerUnit.toFixed(3)}</span></div>`
  ).join('') : '<div style="padding:12px;color:var(--text-dim);font-size:13px">All components added</div>';
  dd.style.display = 'block';
}

function addComponent(id) {
  editingComponents.push(id);
  document.getElementById('addDropdown').style.display = 'none';
  renderDetail();
}

document.addEventListener('click', () => { const dd = document.getElementById('addDropdown'); if(dd) dd.style.display='none'; });

function saveBundle() {
  if (!editingBundle) return;
  const comps = editingComponents.map(id=>microComponents.find(m=>m.id===id)).filter(Boolean);
  const total = comps.reduce((s,c)=>s+c.costPerUnit,0);
  const gp = editingBundle.gpPct || 50;
  editingBundle.costPerUnit = Math.round(total*1000)/1000;
  editingBundle.sellPerUnit = Math.round((total/(1-gp/100))*1000)/1000;
  editingBundle.components = [...editingComponents];
  if (editingBundle.id) {
    const idx = bundles.findIndex(b=>b.id===editingBundle.id);
    if (idx>=0) bundles[idx] = editingBundle;
  } else {
    editingBundle.id = bundles.length + 1;
    bundles.push(editingBundle);
  }
  closeDetail();
}

function toggleBundleStatus() {
  if (!editingBundle) return;
  editingBundle.status = editingBundle.status === 'Active' ? 'Inactive' : 'Active';
  saveBundle();
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(bundles, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'service-bundles.json'; a.click();
}

// ─── INIT ───
renderConfigNav();
renderMainContent();
</script>
</body>
</html>
